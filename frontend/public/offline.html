<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spiro Swap - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .offline-container {
      background: white;
      border-radius: 24px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    
    .offline-icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    
    h1 {
      color: #059669;
      font-size: 28px;
      margin-bottom: 15px;
      font-weight: 700;
    }
    
    p {
      color: #4b5563;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 25px;
    }
    
    .tips {
      background: #f3f4f6;
      border-radius: 16px;
      padding: 20px;
      text-align: left;
      margin-bottom: 25px;
    }
    
    .tips h3 {
      color: #1f2937;
      font-size: 18px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .tips ul {
      list-style: none;
    }
    
    .tips li {
      color: #4b5563;
      font-size: 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .tips li:before {
      content: "✓";
      color: #059669;
      font-weight: bold;
    }
    
    .retry-btn {
      background: #059669;
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
      width: 100%;
    }
    
    .retry-btn:hover {
      background: #047857;
    }
    
    .retry-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>Don't worry! You can still access previously viewed stations and information.</p>
    
    <div class="tips">
      <h3>
        <span>💡</span>
        Tips while offline
      </h3>
      <ul>
        <li>View cached stations you've visited before</li>
        <li>Check battery availability from last visit</li>
        <li>Read reviews you've previously loaded</li>
        <li>Plan your route when connection returns</li>
      </ul>
    </div>
    
    <button 
      class="retry-btn" 
      onclick="window.location.reload()"
      id="retryBtn"
    >
      Try Reconnecting
    </button>
  </div>
  
  <script>
    const retryBtn = document.getElementById('retryBtn');
    
    // Check connection status
    if (navigator.onLine) {
      window.location.reload();
    }
    
    // Listen for connection restoration
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
